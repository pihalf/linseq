name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npx vite build

      - name: Prepare release artifact
        run: |
          mkdir release
          cp -r dist/* release/
          node -e "
            const p = require('./package.json');
            p.main = 'index.html';
            delete p.scripts;
            delete p.devDependencies;
            require('fs').writeFileSync('release/package.json', JSON.stringify(p, null, 2));
          "
          cp logo.png release/
          cd release && zip -r ../logseq-plugin-linear.zip .

      - uses: softprops/action-gh-release@v2
        with:
          files: logseq-plugin-linear.zip
          generate_release_notes: true
